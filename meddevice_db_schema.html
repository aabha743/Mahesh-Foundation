
<div id="erd" style="padding: 8px 0"></div>
<style>
#erd svg { width: 100%; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a28' : '#f1efed',
    primaryBorderColor: dark ? '#5a5a55' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const diagram = `erDiagram
  centers {
    char id PK
    varchar name
    text address
    varchar city
    varchar contact_phone
    boolean is_active
  }
  users {
    char id PK
    varchar name
    varchar mobile
    enum role
    char center_id FK
    boolean is_active
    timestamp last_login
  }
  otp_sessions {
    char id PK
    varchar mobile
    varchar otp_code
    timestamp expires_at
    boolean is_used
    int attempts
  }
  skus {
    char id PK
    varchar name
    varchar sku_code
    varchar category
    boolean is_active
  }
  assets {
    char id PK
    char sku_id FK
    varchar serial_number
    char center_id FK
    enum status
    date warranty_expiry
    text qr_code
  }
  lease_requests {
    char id PK
    varchar token_number
    varchar requestor_name
    varchar mobile
    varchar aadhar_number
    char preferred_center_id FK
    varchar expected_duration
    enum status
    char approved_by FK
    timestamp approved_at
  }
  lease_items {
    char id PK
    char lease_request_id FK
    char sku_id FK
    char asset_id FK
    int quantity_requested
    timestamp issued_at
    date due_date
    timestamp returned_at
    varchar condition_on_return
  }
  asset_transfers {
    char id PK
    char asset_id FK
    char from_center_id FK
    char to_center_id FK
    enum transfer_reason
    varchar reference_number
    char initiated_by FK
    enum status
    timestamp completed_at
  }
  repairs {
    char id PK
    char asset_id FK
    char reported_by FK
    varchar repair_center_name
    date sent_date
    date actual_return_date
    enum status
    decimal cost
  }
  audit_log {
    char id PK
    char user_id FK
    varchar action
    varchar entity_type
    char entity_id
    json old_value
    json new_value
    varchar ip_address
  }
  notifications_log {
    char id PK
    varchar recipient_mobile
    text message
    varchar type
    enum status
    timestamp sent_at
  }

  centers ||--o{ users : "has staff"
  centers ||--o{ assets : "stores"
  centers ||--o{ lease_requests : "preferred by"
  centers ||--o{ asset_transfers : "from"
  centers ||--o{ asset_transfers : "to"
  skus ||--o{ assets : "has units"
  skus ||--o{ lease_items : "requested as"
  assets ||--o{ lease_items : "assigned to"
  assets ||--o{ asset_transfers : "transferred"
  assets ||--o{ repairs : "sent for"
  lease_requests ||--o{ lease_items : "contains"
  users ||--o{ lease_requests : "approves"
  users ||--o{ asset_transfers : "initiates"
  users ||--o{ repairs : "reports"
  users ||--o{ audit_log : "generates"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
